<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__KANBAN_TITLE__</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --surface-2: #f2f1ee;
      --border: #e5e3de;
      --border-hover: #c5c3be;
      --text: #1a1a18;
      --text-2: #6b6b65;
      --text-3: #a8a8a2;
      --high: #ef4444;
      --mid: #f59e0b;
      --low: #22c55e;
      --back: #8b5cf6;
      --blue: #3b82f6;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,.1), 0 2px 4px rgba(0,0,0,.06);
      --r: 10px;
      --r-sm: 6px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── WELCOME ─────────────────────────────────────────────── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
      padding: 40px;
      text-align: center;
    }
    .welcome.hidden { display: none; }
    .welcome-icon { font-size: 48px; line-height: 1; }
    .welcome h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
    .welcome p { color: var(--text-2); font-size: 14px; max-width: 340px; line-height: 1.65; }
    .welcome p code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; background: var(--surface-2); border: 1px solid var(--border); padding: 1px 6px; border-radius: 4px; color: var(--text); }
    .welcome-note { font-size: 12px; color: var(--text-3); }

    /* ── APP ─────────────────────────────────────────────────── */
    .app { display: none; flex-direction: column; flex: 1; overflow: hidden; min-height: 0; }
    .app.visible { display: flex; }

    /* ── TOPBAR ──────────────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      flex-shrink: 0;
      box-shadow: var(--shadow-sm);
    }
    .topbar-logo { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; white-space: nowrap; flex-shrink: 0; }
    .topbar-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
    .chips { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; min-width: 0; }
    .chip {
      padding: 4px 11px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-2);
      font-family: inherit;
      transition: all .15s;
      white-space: nowrap;
    }
    .chip:hover { background: var(--surface-2); border-color: var(--border-hover); color: var(--text); }
    .chip.active { background: var(--text); border-color: var(--text); color: var(--surface); }
    .topbar-right { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }
    .save-status { font-size: 11px; color: var(--text-3); min-width: 60px; text-align: right; }
    .save-status.saving { color: var(--blue); }
    .save-status.saved { color: var(--low); }
    .save-status.error { color: var(--high); }

    /* ── BUTTONS ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 13px;
      border-radius: var(--r-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      transition: all .15s;
      white-space: nowrap;
      line-height: 1;
    }
    .btn:hover { background: var(--surface-2); border-color: var(--border-hover); }
    .btn-primary { background: var(--text); border-color: var(--text); color: var(--surface); }
    .btn-primary:hover { background: #2d2d2b; border-color: #2d2d2b; }
    .btn-ghost { background: transparent; border-color: transparent; color: var(--text-2); }
    .btn-ghost:hover { background: var(--surface-2); border-color: var(--border); color: var(--text); }
    .done-toggle { position: relative; }
    .done-toggle.has-done { border-color: var(--low); color: var(--low); }
    .done-toggle.showing { background: var(--low); border-color: var(--low); color: #fff; }
    .desc-toggle.showing { background: var(--blue); border-color: var(--blue); color: #fff; }

    /* ── BOARD ───────────────────────────────────────────────── */
    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 14px;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── COLUMNS ─────────────────────────────────────────────── */
    .column {
      background: var(--surface-2);
      border-radius: var(--r);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .column.col-high { border-top: 3px solid var(--high); }
    .column.col-mid  { border-top: 3px solid var(--mid); }
    .column.col-low  { border-top: 3px solid var(--low); }
    .column.col-back { border-top: 3px solid var(--back); }

    .col-header {
      padding: 11px 12px 9px;
      display: flex;
      align-items: center;
      gap: 7px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      cursor: grab;
    }
    .col-header:active { cursor: grabbing; }
    .column.col-dragging { opacity: .35; }
    .column.col-drag-over { outline: 2px dashed var(--blue); outline-offset: -3px; }
    .col-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .col-high .col-dot { background: var(--high); }
    .col-mid  .col-dot { background: var(--mid); }
    .col-low  .col-dot { background: var(--low); }
    .col-back .col-dot { background: var(--back); }
    .col-title { font-size: 12px; font-weight: 600; flex: 1; color: var(--text); letter-spacing: 0.1px; }
    .col-cnt {
      font-size: 11px;
      color: var(--text-3);
      background: var(--surface);
      border-radius: 10px;
      padding: 1px 7px;
      border: 1px solid var(--border);
      font-variant-numeric: tabular-nums;
    }
    .col-plus {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--text-3);
      font-size: 17px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      line-height: 1;
    }
    .col-plus:hover { background: var(--surface); color: var(--text); }

    .cards-area {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .cards-area.drag-over {
      background: rgba(59,130,246,.05);
      outline: 2px dashed rgba(59,130,246,.3);
      outline-offset: -3px;
      border-radius: 6px;
    }

    /* ── CARDS ───────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 10px 11px;
      cursor: grab;
      user-select: none;
      transition: box-shadow .15s, border-color .15s, opacity .15s;
      position: relative;
    }
    .card:hover { box-shadow: var(--shadow-sm); border-color: var(--border-hover); }
    .card.dragging { opacity: .35; cursor: grabbing; box-shadow: var(--shadow-md); }
    .card.drop-above { border-top: 2px solid var(--blue); }
    .card.drop-below { border-bottom: 2px solid var(--blue); }
    .card.done { opacity: .55; }
    .card.done .card-text { text-decoration: line-through; color: var(--text-3); }
    .card--lit { border-color: #f59e0b; box-shadow: 0 0 0 2px rgba(245,158,11,.2), var(--shadow-sm); background: #fffbeb; }
    .card--lit:hover { border-color: #d97706; box-shadow: 0 0 0 2px rgba(245,158,11,.3), var(--shadow-sm); }
    .card-lit-badge { display: inline-flex; align-items: center; gap: 3px; color: #b45309; font-weight: 600; }
    .card--review { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,.2), var(--shadow-sm); background: #eff6ff; }
    .card--review:hover { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(59,130,246,.3), var(--shadow-sm); }
    .card-review-badge { display: inline-flex; align-items: center; gap: 3px; color: #1d4ed8; font-weight: 600; }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 6px;
    }
    .card-tag {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--surface-2);
      color: var(--text-2);
      border: 1px solid var(--border);
      white-space: nowrap;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-actions {
      display: flex;
      gap: 2px;
      opacity: 0;
      transition: opacity .15s;
      flex-shrink: 0;
    }
    .card:hover .card-actions,
    .card.done .card-actions { opacity: 1; }
    .card-btn {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-3);
      font-size: 13px;
      transition: all .12s;
      line-height: 1;
    }
    .card-btn:hover { background: var(--surface-2); color: var(--text); }
    .card-btn.done-btn:hover  { background: #dcfce7; color: var(--low); }
    .card-btn.review-btn:hover { background: #dbeafe; color: #2563eb; }
    .card.card--review .review-btn { color: #2563eb; }
    .card-btn.edit-btn:hover  { background: #eff6ff; color: var(--blue); }
    .card-btn.del-btn:hover   { background: #fef2f2; color: var(--high); }
    .card.done .done-btn { color: var(--low); }

    .card-text { font-size: 12.5px; color: var(--text); line-height: 1.55; word-break: break-word; cursor: text; }
    .card-desc {
      font-size: 11.5px;
      color: var(--text-2);
      line-height: 1.55;
      word-break: break-word;
      white-space: pre-wrap;
      margin-top: 7px;
      padding-top: 7px;
      border-top: 1px dashed var(--border);
    }
    .card-meta {
      font-size: 10px;
      color: var(--text-3);
      margin-top: 7px;
      line-height: 1.4;
    }
    .card-meta .done-mark { color: var(--low); }
    .card-inline-edit {
      width: 100%;
      font: inherit;
      font-size: 12.5px;
      color: var(--text);
      line-height: 1.55;
      word-break: break-word;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      padding: 0;
      margin: 0;
      display: block;
      overflow: hidden;
    }

    /* ── MODALS ───────────────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.25);
      backdrop-filter: blur(3px);
      z-index: 50;
      align-items: center;
      justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 22px 24px;
      width: 360px;
      box-shadow: var(--shadow-md);
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .modal-title { font-size: 15px; font-weight: 600; }
    .modal-close {
      width: 28px; height: 28px;
      border: none; background: transparent; cursor: pointer;
      border-radius: 6px; font-size: 18px; color: var(--text-3);
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .modal-close:hover { background: var(--surface-2); color: var(--text); }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .field select,
    .field input[type="text"],
    .field textarea {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 8px 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      transition: border-color .15s, background .15s;
    }
    .field select:focus,
    .field input[type="text"]:focus,
    .field textarea:focus { outline: none; border-color: var(--blue); background: var(--surface); }
    .field textarea { resize: vertical; min-height: 72px; }

    .radio-row { display: flex; gap: 6px; }
    .radio-opt { flex: 1; }
    .radio-opt input[type="radio"] { display: none; }
    .radio-opt label {
      display: flex; align-items: center; justify-content: center; gap: 4px;
      padding: 7px 8px;
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-2);
      transition: all .15s;
    }
    .radio-opt.high input:checked + label { border-color: var(--high); background: var(--high); color: #fff; }
    .radio-opt.mid  input:checked + label { border-color: var(--mid);  background: var(--mid);  color: #fff; }
    .radio-opt.low  input:checked + label { border-color: var(--low);  background: var(--low);  color: #fff; }

    .modal-footer { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }

    /* ── CATEGORY MODAL ──────────────────────────────────────── */
    .cat-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; max-height: 260px; overflow-y: auto; }
    .cat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: var(--surface-2);
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
    }
    .cat-name { flex: 1; font-size: 13px; color: var(--text); }
    .cat-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--blue);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 13px;
      color: var(--text);
      font-family: inherit;
      outline: none;
    }
    .cat-btns { display: flex; gap: 4px; }
    .cat-add-row { display: flex; gap: 6px; }
    .cat-add-row input {
      flex: 1;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 8px 10px;
      font-size: 13px;
      color: var(--text);
      font-family: inherit;
      transition: border-color .15s, background .15s;
    }
    .cat-add-row input:focus { outline: none; border-color: var(--blue); background: var(--surface); }

    /* ── FILTER BAR ──────────────────────────────────────────── */
    .filterbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .filter-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .user-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-family: inherit;
      transition: all .15s;
    }
    .user-badge:hover { border-color: var(--border-hover); background: var(--border); }

    /* ── BOARD TABS (narrow screens) ─────────────────────────── */
    .board-tabs {
      display: none;
      gap: 6px;
      padding: 10px 14px 0;
      flex-shrink: 0;
    }
    .board-tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 9px 6px;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      background: var(--surface-2);
      color: var(--text-2);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      min-width: 0;
    }
    .board-tab:hover { color: var(--text); border-color: var(--border-hover); }
    .board-tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow-sm); }
    .tab-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .board-tab-high .tab-dot { background: var(--high); }
    .board-tab-mid  .tab-dot { background: var(--mid); }
    .board-tab-low  .tab-dot { background: var(--low); }
    .board-tab-back .tab-dot { background: var(--back); }
    .tab-title { overflow: hidden; text-overflow: ellipsis; }
    .tab-cnt {
      font-size: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 6px;
      color: var(--text-3);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    @media (max-width: 760px) {
      .board-tabs { display: flex; }
      .board { grid-template-columns: 1fr; padding-top: 10px; }
      .column { display: none; }
      .column.tab-active { display: flex; }

      /* let chips wrap to multiple rows (see all categories) but
         make them compact so the rows stay tight and tidy */
      .chips { gap: 4px; }
      .chip {
        padding: 3px 9px;
        font-size: 11px;
      }

      /* stack the topbar: action buttons on their own row,
         category chips on a full-width row below */
      .topbar-right {
        order: -1;
        flex: 0 0 100%;
        justify-content: flex-end;
      }
      .topbar > .chips { flex: 0 0 100%; }

      /* reclaim horizontal room so fewer rows are needed */
      .topbar-logo { display: none; }
      .topbar > .topbar-sep { display: none; }
      .save-status { min-width: 0; }
    }

    /* ── SCROLLBAR ───────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }
  </style>
</head>
<body>

<!-- WELCOME SCREEN -->
<div class="welcome" id="welcome">
  <div class="welcome-icon">🗂️</div>
  <h1>Kanban</h1>
  <p>Open <code>kanban.json</code> to get started.<br>Saved in real time — drag · edit · ship it.</p>
  <button class="btn btn-primary" style="padding:9px 20px;font-size:14px" onclick="pickFile()">📂 Open data file</button>
  <p class="welcome-note">Chrome / Edge only &nbsp;·&nbsp; Data stays in a local file</p>
</div>

<!-- MAIN APP -->
<div class="app" id="app">
  <div class="topbar">
    <span class="topbar-logo">🗂️ __KANBAN_HEADER__</span>
    <div class="topbar-sep"></div>
    <div class="chips" id="chips"></div>
    <div class="topbar-right">
      <span class="save-status" id="saveStatus"></span>
      <button class="btn desc-toggle" id="descToggle" onclick="toggleShowDesc()">Desc</button>
      <button class="btn done-toggle" id="doneToggle" onclick="toggleShowDone()">Done</button>
      <button class="btn btn-ghost" onclick="openCatModal()">⚙ Categories</button>
      <button class="user-badge" id="userBadge" onclick="openNameModal(true)" title="Click to change your name">？</button>
    </div>
  </div>

  <div class="filterbar">
    <span class="filter-label">Who</span>
    <div class="chips" id="personChips"></div>
    <div class="topbar-sep"></div>
    <span class="filter-label">When</span>
    <div class="chips" id="timeChips"></div>
  </div>

  <div class="board-tabs" id="boardTabs"></div>
  <div class="board" id="board"></div>
</div>

<!-- ADD / EDIT CARD MODAL -->
<div class="overlay" id="cardOverlay">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title" id="cardModalTitle">Add card</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="field">
      <label>Section</label>
      <select id="m-section"></select>
    </div>
    <div class="field">
      <label>Title</label>
      <textarea id="m-content" placeholder="Enter task title…" rows="3"></textarea>
    </div>
    <div class="field">
      <label>Description (optional)</label>
      <textarea id="m-desc" placeholder="Context, background, acceptance criteria…" rows="4"></textarea>
    </div>
    <div class="field" id="m-pri-field">
      <label>Priority</label>
      <div class="radio-row">
        <div class="radio-opt high"><input type="radio" name="pri" id="pri-high" value="high"><label for="pri-high">🔴 High</label></div>
        <div class="radio-opt mid"><input type="radio" name="pri" id="pri-mid" value="mid"><label for="pri-mid">🟡 Medium</label></div>
        <div class="radio-opt low"><input type="radio" name="pri" id="pri-low" value="low"><label for="pri-low">🟢 Low</label></div>
      </div>
    </div>
    <div class="field">
      <label>Column</label>
      <select id="m-col" onchange="onColChange()">
        <option value="high">High</option>
        <option value="mid">Medium</option>
        <option value="low">Low</option>
        <option value="backlog">Backlog</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="cardConfirmBtn" onclick="confirmCard()">Add</button>
    </div>
  </div>
</div>

<!-- CATEGORY MANAGEMENT MODAL -->
<div class="overlay" id="catOverlay">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">Manage categories</span>
      <button class="modal-close" onclick="closeCatModal()">×</button>
    </div>
    <div class="cat-list" id="catList"></div>
    <div class="cat-add-row">
      <input id="catAddInput" placeholder="New category name…" onkeydown="if(event.key==='Enter')addCategory()">
      <button class="btn btn-primary" onclick="addCategory()">Add</button>
    </div>
  </div>
</div>

<!-- NAME PROMPT (no dismiss) -->
<div class="overlay" id="nameOverlay">
  <div class="modal" style="width:300px">
    <div class="modal-head">
      <span class="modal-title" id="nameModalTitle">👋 Who are you?</span>
    </div>
    <p style="font-size:13px;color:var(--text-2);margin-bottom:14px;line-height:1.65">Enter your name — every card records who created and edited it.</p>
    <div class="field">
      <label>Name</label>
      <input type="text" id="nameInput" placeholder="e.g. Alex" maxlength="20"
        onkeydown="if(event.key==='Enter')confirmName()">
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" style="width:100%" onclick="confirmName()">Enter board</button>
    </div>
  </div>
</div>

<script>
// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const PRI_TO_COL = { 'high': 'high', 'mid': 'mid', 'low': 'low' };
const COL_TO_PRI = { high: 'high', mid: 'mid', low: 'low' };
const COL_CONFIG = {
  high:    { title: 'High', cls: 'col-high' },
  mid:     { title: 'Medium', cls: 'col-mid'  },
  low:     { title: 'Low', cls: 'col-low'  },
  backlog: { title: 'Backlog',   cls: 'col-back' },
};
const DEFAULT_COL_ORDER = ['high', 'mid', 'low', 'backlog'];
const COL_ACCENT = { high: 'high', mid: 'mid', low: 'low', backlog: 'back' };
const DB_NAME = '__KANBAN_DB__';
const DB_STORE = 'handles';

// ─── STATE ────────────────────────────────────────────────────────────────────
const state = {
  categories: [],
  columns: { high: [], mid: [], low: [], backlog: [] },
  colOrder: [...DEFAULT_COL_ORDER],
  filterCats: new Set(),
  filterPerson: null,
  filterTime: null,
  showDone: false,
  showDesc: false,
  activeTab: null,
};
let editingCard = null;
let dragged = null;
let draggedCol = null;
let fileHandle = null;
let saveTimer = null;
let serverMode = false;
let dropTarget = null;
let currentUser = localStorage.getItem('triage-username') || null;

// ─── SERVER MODE (auto-load via fetch when served from localhost) ─────────────
async function tryServerLoad() {
  const h = window.location.hostname;
  if (h !== 'localhost' && h !== '127.0.0.1') return false;
  try {
    const resp = await fetch('/kanban.json');
    if (!resp.ok) return false;
    const data = await resp.json();
    serverMode = true;
    initState(data);
    document.getElementById('welcome').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    renderColumns();
    renderAllFilters();
    render();
    updateDoneToggle();
    checkUsername();
    return true;
  } catch (e) { return false; }
}

// ─── FILE SYSTEM ACCESS API ──────────────────────────────────────────────────
async function pickFile() {
  try {
    const [handle] = await window.showOpenFilePicker({
      types: [{ description: 'Kanban JSON', accept: { 'application/json': ['.json'] } }],
      multiple: false,
    });
    await loadHandle(handle);
    await storeHandle(handle);
  } catch (e) {
    if (e.name !== 'AbortError') alert('Failed to open file: ' + e.message);
  }
}

async function loadHandle(handle) {
  fileHandle = handle;
  const file = await handle.getFile();
  const text = await file.text();
  let data;
  try { data = JSON.parse(text); } catch (e) { alert('JSON parse failed: ' + e.message); return; }
  initState(data);
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  renderColumns();
  renderAllFilters();
  render();
  updateDoneToggle();
  checkUsername();
}

async function saveFile() {
  setSaveStatus('saving');
  if (serverMode) {
    try {
      const resp = await fetch('/kanban.json', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(stateToData(), null, 2),
      });
      if (!resp.ok) throw new Error(resp.status);
      setSaveStatus('saved');
    } catch (e) {
      setSaveStatus('error');
    }
    return;
  }
  if (!fileHandle) return;
  try {
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(stateToData(), null, 2));
    await writable.close();
    setSaveStatus('saved');
  } catch (e) {
    setSaveStatus('error');
  }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveFile, 600);
}

function setSaveStatus(s) {
  const el = document.getElementById('saveStatus');
  el.className = 'save-status ' + s;
  el.textContent = s === 'saving' ? 'Saving…' : s === 'saved' ? 'Saved ✓' : 'Save failed';
  if (s === 'saved') setTimeout(() => { if (el.textContent === 'Saved ✓') el.textContent = ''; }, 3000);
}

// ─── INDEXEDDB ────────────────────────────────────────────────────────────────
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(DB_STORE);
    req.onsuccess = e => res(e.target.result);
    req.onerror = rej;
  });
}

async function storeHandle(handle) {
  try {
    const db = await openDB();
    db.transaction(DB_STORE, 'readwrite').objectStore(DB_STORE).put(handle, 'main');
  } catch (e) {}
}

async function restoreHandle() {
  try {
    const db = await openDB();
    const handle = await new Promise((res, rej) => {
      const req = db.transaction(DB_STORE).objectStore(DB_STORE).get('main');
      req.onsuccess = () => res(req.result);
      req.onerror = rej;
    });
    if (!handle) return;
    const perm = await handle.queryPermission({ mode: 'readwrite' });
    if (perm === 'granted') { await loadHandle(handle); return; }
    const granted = await handle.requestPermission({ mode: 'readwrite' });
    if (granted === 'granted') await loadHandle(handle);
  } catch (e) {}
}

// ─── DATA MODEL ───────────────────────────────────────────────────────────────
function initState(data) {
  state.columns = { high: [], mid: [], low: [], backlog: [] };
  const meta = i => ({ addedBy: i.addedBy||null, addedAt: i.addedAt||null, updatedBy: i.updatedBy||null, updatedAt: i.updatedAt||null, doneBy: i.doneBy||null, doneAt: i.doneAt||null, litBy: i.litBy||null, litAt: i.litAt||null, review: i.review||false, reviewBy: i.reviewBy||null, reviewAt: i.reviewAt||null });
  (data.todo || []).forEach(item => {
    const col = PRI_TO_COL[item['priority']] || 'mid';
    state.columns[col].push({ section: item['section'], title: item['title'], description: item['description'] || '', priority: item['priority'] || COL_TO_PRI[col], done: !!item.done, ...meta(item) });
  });
  (data.backlog || []).forEach(item => {
    state.columns.backlog.push({ section: item['section'], title: item['title'], description: item['description'] || '', done: !!item.done, ...meta(item) });
  });
  state.colOrder = (data.colOrder && data.colOrder.length) ? [...data.colOrder] : [...DEFAULT_COL_ORDER];
  if (data.categories && data.categories.length) {
    state.categories = [...data.categories];
  } else {
    const all = [...state.columns.high, ...state.columns.mid, ...state.columns.low, ...state.columns.backlog];
    state.categories = [...new Set(all.map(i => i['section']).filter(Boolean))];
  }
}

function stateToData() {
  const m = i => ({ addedBy: i.addedBy||null, addedAt: i.addedAt||null, updatedBy: i.updatedBy||null, updatedAt: i.updatedAt||null, doneBy: i.doneBy||null, doneAt: i.doneAt||null, litBy: i.litBy||null, litAt: i.litAt||null, review: i.review||false, reviewBy: i.reviewBy||null, reviewAt: i.reviewAt||null });
  return {
    colOrder: state.colOrder,
    categories: state.categories,
    todo: [
      ...state.columns.high.map(i => ({ section: i['section'], title: i['title'], description: i['description'] || '', priority: 'high', done: !!i.done, ...m(i) })),
      ...state.columns.mid.map(i => ({ section: i['section'], title: i['title'], description: i['description'] || '', priority: 'mid', done: !!i.done, ...m(i) })),
      ...state.columns.low.map(i => ({ section: i['section'], title: i['title'], description: i['description'] || '', priority: 'low', done: !!i.done, ...m(i) })),
    ],
    backlog: state.columns.backlog.map(i => ({ section: i['section'], title: i['title'], description: i['description'] || '', done: !!i.done, ...m(i) })),
  };
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function matchesFilters(item) {
  if (state.filterCats.size > 0 && !state.filterCats.has(item['section'])) return false;
  if (state.filterPerson) {
    const person = item.updatedBy || item.addedBy;
    if (person !== state.filterPerson) return false;
  }
  if (state.filterTime) {
    const t = item.updatedAt || item.addedAt;
    if (!t) return false;
    const diff = Date.now() - new Date(t).getTime();
    const DAY = 86400000;
    if (state.filterTime === 'today' && diff > DAY) return false;
    if (state.filterTime === 'week'  && diff > 7  * DAY) return false;
    if (state.filterTime === 'month' && diff > 30 * DAY) return false;
  }
  return true;
}

function render() {
  ['high', 'mid', 'low', 'backlog'].forEach(col => {
    const area = document.getElementById('col-' + col);
    area.innerHTML = '';
    state.columns[col].forEach((item, idx) => {
      if (!matchesFilters(item)) return;
      if (state.showDone ? !item.done : item.done) return;
      area.appendChild(makeCard(item, col, idx));
    });
    updateCount(col);
  });
}

function makeCard(item, col, idx) {
  const el = document.createElement('div');
  el.className = 'card' + (item.done ? ' done' : '') + (item.litBy ? ' card--lit' : '') + (item.review && !item.done && !item.litBy ? ' card--review' : '');
  el.draggable = true;
  el.dataset.col = col;
  el.dataset.idx = idx;

  const top = document.createElement('div');
  top.className = 'card-top';

  const tag = document.createElement('span');
  tag.className = 'card-tag';
  tag.textContent = item['description'] ? '📝 ' + item['section'] : item['section'];

  const acts = document.createElement('div');
  acts.className = 'card-actions';

  const mkBtn = (cls, title, text, fn) => {
    const b = document.createElement('button');
    b.className = 'card-btn ' + cls;
    b.title = title;
    b.textContent = text;
    b.onclick = e => { e.stopPropagation(); fn(); };
    return b;
  };

  if (!item.done) acts.appendChild(mkBtn('review-btn', item.review ? 'Unmark review' : 'Mark for review', '🔍', () => toggleReview(col, idx)));
  acts.appendChild(mkBtn('done-btn', item.done ? 'Mark as not done' : 'Mark as done', item.done ? '✓' : '○', () => toggleDone(col, idx)));
  acts.appendChild(mkBtn('edit-btn', 'Edit', '✎', () => openModal(col, idx)));
  acts.appendChild(mkBtn('del-btn', 'Delete', '×', () => deleteCard(col, idx)));

  top.appendChild(tag);
  top.appendChild(acts);

  const text = document.createElement('div');
  text.className = 'card-text';
  text.textContent = item['title'];
  text.addEventListener('dblclick', e => { e.stopPropagation(); startInlineEdit(el, text, item, col, idx); });

  el.appendChild(top);
  el.appendChild(text);

  // description (shown when global toggle is on)
  if (state.showDesc && item['description']) {
    const desc = document.createElement('div');
    desc.className = 'card-desc';
    desc.textContent = item['description'];
    desc.title = 'Double-click to edit description';
    desc.addEventListener('dblclick', e => { e.stopPropagation(); openModal(col, idx); });
    el.appendChild(desc);
  }

  // meta footer
  const name = item.updatedBy || item.addedBy;
  const time = item.updatedAt || item.addedAt;
  if (name || time || (item.done && item.doneAt) || item.litBy || (item.review && !item.done)) {
    const meta = document.createElement('div');
    meta.className = 'card-meta';
    let parts = [];
    if (item.litBy) parts.push(`<span class="card-lit-badge">⚡ ${item.litBy} working</span>`);
    if (item.review && !item.done && !item.litBy) parts.push(`<span class="card-review-badge">🔍 review${item.reviewBy ? ' · ' + item.reviewBy : ''}</span>`);
    if (name) parts.push(name);
    if (!item.done && time) parts.push(relativeTime(time));
    if (item.done && item.doneAt) parts.push(`<span class="done-mark">✓ done ${relativeTime(item.doneAt)}</span>`);
    meta.innerHTML = parts.join(' · ');
    el.appendChild(meta);
  }

  el.addEventListener('dblclick', e => {
    if (e.target.closest('.card-text, .card-btn, .card-inline-edit')) return;
    e.stopPropagation();
    toggleLit(col, idx);
  });

  el.addEventListener('dragstart', e => {
    dragged = { col, idx };
    e.stopPropagation();
    setTimeout(() => el.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
  });
  el.addEventListener('dragover', e => {
    if (!dragged) return;
    const rect = el.getBoundingClientRect();
    const insertBefore = e.clientY < rect.top + rect.height / 2;
    dropTarget = { col, idx, insertBefore };
    document.querySelectorAll('.drop-above,.drop-below').forEach(c => c.classList.remove('drop-above', 'drop-below'));
    el.classList.add(insertBefore ? 'drop-above' : 'drop-below');
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    document.querySelectorAll('.drop-above,.drop-below').forEach(c => c.classList.remove('drop-above', 'drop-below'));
    dragged = null;
    dropTarget = null;
  });

  return el;
}

function updateCount(col) {
  let n = 0;
  state.columns[col].forEach(i => {
    if (!matchesFilters(i)) return;
    if (state.showDone ? !i.done : i.done) return;
    n++;
  });
  document.getElementById('cnt-' + col).textContent = n;
  const tabCnt = document.getElementById('tab-cnt-' + col);
  if (tabCnt) tabCnt.textContent = n;
}

function renderCategoryChips() {
  const container = document.getElementById('chips');
  container.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'chip' + (state.filterCats.size === 0 ? ' active' : '');
  all.textContent = 'All';
  all.onclick = () => { state.filterCats.clear(); renderCategoryChips(); render(); };
  container.appendChild(all);
  state.categories.forEach(s => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (state.filterCats.has(s) ? ' active' : '');
    chip.textContent = s;
    chip.onclick = () => {
      if (state.filterCats.has(s)) state.filterCats.delete(s); else state.filterCats.add(s);
      renderCategoryChips();
      render();
    };
    container.appendChild(chip);
  });
}

function getPersons() {
  const all = [...state.columns.high, ...state.columns.mid, ...state.columns.low, ...state.columns.backlog];
  return [...new Set(all.map(i => i.addedBy || i.updatedBy).filter(Boolean))];
}

function renderPersonChips() {
  const container = document.getElementById('personChips');
  container.innerHTML = '';
  getPersons().forEach(p => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (state.filterPerson === p ? ' active' : '');
    chip.textContent = p;
    chip.onclick = () => { state.filterPerson = state.filterPerson === p ? null : p; renderPersonChips(); render(); };
    container.appendChild(chip);
  });
}

function renderTimeChips() {
  const container = document.getElementById('timeChips');
  container.innerHTML = '';
  [{ key: 'today', label: 'Today' }, { key: 'week', label: 'This week' }, { key: 'month', label: 'This month' }].forEach(o => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (state.filterTime === o.key ? ' active' : '');
    chip.textContent = o.label;
    chip.onclick = () => { state.filterTime = state.filterTime === o.key ? null : o.key; renderTimeChips(); render(); };
    container.appendChild(chip);
  });
}

function renderAllFilters() {
  renderCategoryChips();
  renderPersonChips();
  renderTimeChips();
}

// ─── COLUMNS ──────────────────────────────────────────────────────────────────
function renderColumns() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  if (!state.activeTab || !state.colOrder.includes(state.activeTab)) {
    state.activeTab = state.colOrder[0];
  }
  state.colOrder.forEach(key => {
    const cfg = COL_CONFIG[key];

    const colEl = document.createElement('div');
    colEl.className = 'column ' + cfg.cls + (key === state.activeTab ? ' tab-active' : '');
    colEl.dataset.colKey = key;
    colEl.draggable = true;

    const header = document.createElement('div');
    header.className = 'col-header';

    const dot = document.createElement('div');
    dot.className = 'col-dot';

    const title = document.createElement('span');
    title.className = 'col-title';
    title.textContent = cfg.title;

    const cnt = document.createElement('span');
    cnt.className = 'col-cnt';
    cnt.id = 'cnt-' + key;
    cnt.textContent = '0';

    const plus = document.createElement('button');
    plus.className = 'col-plus';
    plus.title = 'Add';
    plus.textContent = '+';
    plus.onclick = e => { e.stopPropagation(); openModal(key, null); };

    header.appendChild(dot);
    header.appendChild(title);
    header.appendChild(cnt);
    header.appendChild(plus);

    const area = document.createElement('div');
    area.className = 'cards-area';
    area.id = 'col-' + key;
    area.dataset.col = key;
    area.addEventListener('dragover', onDragOver);
    area.addEventListener('drop', onDrop);
    area.addEventListener('dragleave', onDragLeave);

    colEl.appendChild(header);
    colEl.appendChild(area);

    // column drag-to-reorder
    colEl.addEventListener('dragstart', e => {
      if (dragged) return;
      draggedCol = key;
      e.stopPropagation();
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => colEl.classList.add('col-dragging'), 0);
    });
    colEl.addEventListener('dragend', () => {
      colEl.classList.remove('col-dragging');
      draggedCol = null;
      document.querySelectorAll('.column').forEach(c => c.classList.remove('col-drag-over'));
    });
    colEl.addEventListener('dragover', e => {
      if (!draggedCol || draggedCol === key) return;
      e.preventDefault();
      e.stopPropagation();
      colEl.classList.add('col-drag-over');
    });
    colEl.addEventListener('dragleave', e => {
      if (!colEl.contains(e.relatedTarget)) colEl.classList.remove('col-drag-over');
    });
    colEl.addEventListener('drop', e => {
      if (!draggedCol || draggedCol === key) return;
      e.preventDefault();
      e.stopPropagation();
      colEl.classList.remove('col-drag-over');
      const from = state.colOrder.indexOf(draggedCol);
      const to = state.colOrder.indexOf(key);
      state.colOrder.splice(from, 1);
      state.colOrder.splice(to, 0, draggedCol);
      renderColumns();
      render();
      scheduleSave();
    });

    board.appendChild(colEl);
  });
  renderTabs();
}

function renderTabs() {
  const bar = document.getElementById('boardTabs');
  bar.innerHTML = '';
  state.colOrder.forEach(key => {
    const cfg = COL_CONFIG[key];
    const tab = document.createElement('button');
    tab.className = 'board-tab board-tab-' + COL_ACCENT[key] + (key === state.activeTab ? ' active' : '');
    tab.dataset.col = key;
    tab.onclick = () => setActiveTab(key);

    const dot = document.createElement('span');
    dot.className = 'tab-dot';

    const title = document.createElement('span');
    title.className = 'tab-title';
    title.textContent = cfg.title;

    const cnt = document.createElement('span');
    cnt.className = 'tab-cnt';
    cnt.id = 'tab-cnt-' + key;
    cnt.textContent = '0';

    tab.appendChild(dot);
    tab.appendChild(title);
    tab.appendChild(cnt);
    bar.appendChild(tab);
  });
  state.colOrder.forEach(updateCount);
}

function setActiveTab(key) {
  state.activeTab = key;
  document.querySelectorAll('.board-tab').forEach(t => t.classList.toggle('active', t.dataset.col === key));
  document.querySelectorAll('.column').forEach(c => c.classList.toggle('tab-active', c.dataset.colKey === key));
}

// ─── DRAG & DROP ──────────────────────────────────────────────────────────────
function onDragOver(e) { if (!dragged) return; e.preventDefault(); e.stopPropagation(); e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e) { if (!e.currentTarget.contains(e.relatedTarget)) e.currentTarget.classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  document.querySelectorAll('.drop-above,.drop-below').forEach(c => c.classList.remove('drop-above', 'drop-below'));
  if (!dragged) return;
  const tCol = e.currentTarget.dataset.col;
  if (tCol === dragged.col) {
    if (!dropTarget || dropTarget.col !== tCol) return;
    const fromIdx = dragged.idx;
    const rawIdx = dropTarget.insertBefore ? dropTarget.idx : dropTarget.idx + 1;
    const toIdx = rawIdx > fromIdx ? rawIdx - 1 : rawIdx;
    if (toIdx === fromIdx) return;
    const [item] = state.columns[tCol].splice(fromIdx, 1);
    state.columns[tCol].splice(toIdx, 0, item);
    render();
    scheduleSave();
    return;
  }
  const [item] = state.columns[dragged.col].splice(dragged.idx, 1);
  const now = new Date().toISOString();
  const meta = { addedBy: item.addedBy, addedAt: item.addedAt, updatedBy: currentUser, updatedAt: now, doneBy: item.doneBy, doneAt: item.doneAt, litBy: item.litBy||null, litAt: item.litAt||null, review: item.review||false, reviewBy: item.reviewBy||null, reviewAt: item.reviewAt||null };
  if (tCol === 'backlog') {
    state.columns.backlog.push({ section: item['section'], title: item['title'], description: item['description'] || '', done: item.done, ...meta });
  } else {
    state.columns[tCol].push({ section: item['section'], title: item['title'], description: item['description'] || '', priority: COL_TO_PRI[tCol], done: item.done, ...meta });
  }
  render();
  scheduleSave();
}

// ─── DONE ─────────────────────────────────────────────────────────────────────
function toggleDone(col, idx) {
  const card = state.columns[col][idx];
  card.done = !card.done;
  const now = new Date().toISOString();
  if (card.done) {
    card.doneBy = currentUser;
    card.doneAt = now;
    card.review = false;
    card.reviewBy = null;
    card.reviewAt = null;
    card.litBy = null;
    card.litAt = null;
  } else {
    card.doneBy = null;
    card.doneAt = null;
  }
  card.updatedBy = currentUser;
  card.updatedAt = now;
  render();
  updateDoneToggle();
  scheduleSave();
}

// ─── LIT (working) ───────────────────────────────────────────────────────────────
function toggleLit(col, idx) {
  if (!currentUser) { openNameModal(false); return; }
  const card = state.columns[col][idx];
  if (card.litBy === currentUser) {
    card.litBy = null;
    card.litAt = null;
  } else {
    card.litBy = currentUser;
    card.litAt = new Date().toISOString();
  }
  render();
  scheduleSave();
}

// ─── REVIEW (review) ─────────────────────────────────────────────────────────────
function toggleReview(col, idx) {
  if (!currentUser) { openNameModal(false); return; }
  const card = state.columns[col][idx];
  const now = new Date().toISOString();
  if (card.review) {
    card.review = false;
    card.reviewBy = null;
    card.reviewAt = null;
  } else {
    card.review = true;
    card.reviewBy = currentUser;
    card.reviewAt = now;
    card.litBy = null;   // review and "working" are mutually exclusive
    card.litAt = null;
  }
  card.updatedBy = currentUser;
  card.updatedAt = now;
  render();
  scheduleSave();
}

function toggleShowDone() {
  state.showDone = !state.showDone;
  updateDoneToggle();
  render();
}

function toggleShowDesc() {
  state.showDesc = !state.showDesc;
  document.getElementById('descToggle').classList.toggle('showing', state.showDesc);
  render();
}

function updateDoneToggle() {
  const total = [...state.columns.high, ...state.columns.mid, ...state.columns.low, ...state.columns.backlog];
  const count = total.filter(i => i.done).length;
  const btn = document.getElementById('doneToggle');
  btn.textContent = count ? `Done (${count})` : 'Done';
  btn.className = 'btn done-toggle' +
    (count && !state.showDone ? ' has-done' : '') +
    (state.showDone ? ' showing' : '');
}

// ─── ADD / EDIT MODAL ─────────────────────────────────────────────────────────
function openModal(colHint, idx) {
  editingCard = (idx !== null && idx !== undefined) ? { col: colHint, idx } : null;

  const sel = document.getElementById('m-section');
  sel.innerHTML = state.categories.map(s => `<option>${s}</option>`).join('');

  const colSel = document.getElementById('m-col');
  colSel.value = colHint || 'mid';
  syncPriField();

  if (editingCard) {
    const item = state.columns[editingCard.col][editingCard.idx];
    document.getElementById('cardModalTitle').textContent = 'Edit card';
    document.getElementById('cardConfirmBtn').textContent = 'Save';
    sel.value = item['section'];
    document.getElementById('m-content').value = item['title'];
    document.getElementById('m-desc').value = item['description'] || '';
    colSel.value = editingCard.col;
    syncPriField();
    if (editingCard.col !== 'backlog') {
      const pri = item['priority'] || 'mid';
      document.querySelector(`input[name="pri"][value="${pri}"]`).checked = true;
    }
  } else {
    document.getElementById('cardModalTitle').textContent = 'Add card';
    document.getElementById('cardConfirmBtn').textContent = 'Add';
    document.getElementById('m-content').value = '';
    document.getElementById('m-desc').value = '';
    if (colHint !== 'backlog') document.getElementById('pri-mid').checked = true;
  }

  document.getElementById('cardOverlay').classList.add('open');
  setTimeout(() => document.getElementById('m-content').focus(), 60);
}

function onColChange() { syncPriField(); }

function syncPriField() {
  const isBacklog = document.getElementById('m-col').value === 'backlog';
  document.getElementById('m-pri-field').style.display = isBacklog ? 'none' : '';
}

function closeModal() { document.getElementById('cardOverlay').classList.remove('open'); }

function confirmCard() {
  const content = document.getElementById('m-content').value.trim();
  const desc = document.getElementById('m-desc').value.trim();
  const section = document.getElementById('m-section').value;
  const tCol = document.getElementById('m-col').value;
  if (!content || !section) return;

  const now = new Date().toISOString();
  let origMeta = {};
  if (editingCard) {
    const orig = state.columns[editingCard.col][editingCard.idx];
    origMeta = { addedBy: orig.addedBy, addedAt: orig.addedAt, doneBy: orig.doneBy, doneAt: orig.doneAt, done: orig.done, litBy: orig.litBy, litAt: orig.litAt, review: orig.review, reviewBy: orig.reviewBy, reviewAt: orig.reviewAt };
  }

  const base = {
    section: section,
    title: content,
    description: desc,
    done: origMeta.done || false,
    addedBy: origMeta.addedBy || currentUser,
    addedAt: origMeta.addedAt || now,
    updatedBy: currentUser,
    updatedAt: now,
    doneBy: origMeta.doneBy || null,
    doneAt: origMeta.doneAt || null,
    litBy: origMeta.litBy || null,
    litAt: origMeta.litAt || null,
    review: origMeta.review || false,
    reviewBy: origMeta.reviewBy || null,
    reviewAt: origMeta.reviewAt || null,
  };

  const card = tCol === 'backlog'
    ? base
    : { ...base, priority: document.querySelector('input[name="pri"]:checked')?.value || COL_TO_PRI[tCol] || 'mid' };

  if (editingCard && editingCard.col === tCol) {
    // Same column: replace in place, keep card order
    state.columns[tCol].splice(editingCard.idx, 1, card);
  } else {
    // New card, or column changed on edit: remove from old column (if any), append to end of target column
    if (editingCard) state.columns[editingCard.col].splice(editingCard.idx, 1);
    state.columns[tCol].push(card);
  }

  renderAllFilters();
  render();
  updateDoneToggle();
  scheduleSave();
  closeModal();
}

function deleteCard(col, idx) {
  state.columns[col].splice(idx, 1);
  render();
  updateDoneToggle();
  scheduleSave();
}

// ─── INLINE EDIT ──────────────────────────────────────────────────────────────
function startInlineEdit(cardEl, textEl, item, col, idx) {
  if (cardEl.querySelector('.card-inline-edit')) return;

  const ta = document.createElement('textarea');
  ta.className = 'card-inline-edit';
  ta.value = item['title'];
  ta.rows = 1;

  const resize = () => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; };

  textEl.replaceWith(ta);
  cardEl.draggable = false;
  resize();
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);
  ta.addEventListener('input', resize);

  let committed = false;
  const commit = () => {
    if (committed) return;
    committed = true;
    const newVal = ta.value.trim();
    if (newVal && newVal !== item['title']) {
      const card = state.columns[col][idx];
      card['title'] = newVal;
      card.updatedBy = currentUser;
      card.updatedAt = new Date().toISOString();
      scheduleSave();
    }
    render();
  };

  ta.addEventListener('blur', commit);
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ta.blur(); }
    if (e.key === 'Escape') {
      committed = true;
      ta.removeEventListener('blur', commit);
      render();
    }
  });
}

// ─── CATEGORY MODAL ───────────────────────────────────────────────────────────
function openCatModal() {
  renderCatList();
  document.getElementById('catAddInput').value = '';
  document.getElementById('catOverlay').classList.add('open');
}

function closeCatModal() {
  document.getElementById('catOverlay').classList.remove('open');
  renderAllFilters();
  render();
  scheduleSave();
}

function renderCatList() {
  const list = document.getElementById('catList');
  list.innerHTML = '';
  state.categories.forEach((cat, idx) => {
    const item = document.createElement('div');
    item.className = 'cat-item';

    const nameEl = document.createElement('span');
    nameEl.className = 'cat-name';
    nameEl.textContent = cat;

    const btns = document.createElement('div');
    btns.className = 'cat-btns';

    const renBtn = document.createElement('button');
    renBtn.className = 'btn';
    renBtn.style.padding = '4px 10px';
    renBtn.style.fontSize = '12px';
    renBtn.textContent = 'Rename';
    renBtn.onclick = () => startRename(item, nameEl, idx, cat);

    const delBtn = document.createElement('button');
    delBtn.className = 'btn';
    delBtn.style.cssText = 'padding:4px 10px;font-size:12px;color:var(--high)';
    delBtn.textContent = 'Delete';
    delBtn.onclick = () => { deleteCategory(idx); renderCatList(); };

    btns.appendChild(renBtn);
    btns.appendChild(delBtn);
    item.appendChild(nameEl);
    item.appendChild(btns);
    list.appendChild(item);
  });
}

function startRename(itemEl, nameEl, idx, oldName) {
  const input = document.createElement('input');
  input.className = 'cat-input';
  input.value = oldName;
  itemEl.replaceChild(input, nameEl);
  input.focus();
  input.select();

  const commit = () => {
    const newName = input.value.trim();
    if (newName && newName !== oldName) {
      state.categories[idx] = newName;
      ['high', 'mid', 'low', 'backlog'].forEach(col => {
        state.columns[col].forEach(card => { if (card['section'] === oldName) card['section'] = newName; });
      });
      if (state.filterCats.has(oldName)) { state.filterCats.delete(oldName); state.filterCats.add(newName); }
    }
    renderCatList();
  };

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') commit(); if (e.key === 'Escape') renderCatList(); });
}

function deleteCategory(idx) {
  const name = state.categories[idx];
  state.categories.splice(idx, 1);
  state.filterCats.delete(name);
}

function addCategory() {
  const input = document.getElementById('catAddInput');
  const name = input.value.trim();
  if (!name || state.categories.includes(name)) return;
  state.categories.push(name);
  input.value = '';
  renderCatList();
}

// ─── USERNAME ─────────────────────────────────────────────────────────────────
function checkUsername() {
  if (!currentUser) {
    openNameModal(false);
  }
  updateUserBadge();
}

function openNameModal(isChange) {
  document.getElementById('nameModalTitle').textContent = isChange ? 'Change name' : '👋 Who are you?';
  document.getElementById('nameInput').value = isChange && currentUser ? currentUser : '';
  document.getElementById('nameOverlay').classList.add('open');
  setTimeout(() => { const el = document.getElementById('nameInput'); el.focus(); el.select(); }, 60);
}

function confirmName() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  currentUser = name;
  localStorage.setItem('triage-username', name);
  document.getElementById('nameOverlay').classList.remove('open');
  updateUserBadge();
}

function updateUserBadge() {
  const b = document.getElementById('userBadge');
  if (b) b.textContent = currentUser || '？';
}

// ─── RELATIVE TIME ────────────────────────────────────────────────────────────
function relativeTime(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  if (diff < 0) return 'just now';
  const min = Math.floor(diff / 60000);
  if (min < 1) return 'just now';
  if (min < 60) return `${min}m ago`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h ago`;
  const day = Math.floor(hr / 24);
  if (day === 1) return 'yesterday';
  if (day < 7) return `${day}d ago`;
  const d = new Date(iso);
  return `${d.getMonth() + 1}/${d.getDate()}`;
}

// ─── KEYBOARD ─────────────────────────────────────────────────────────────────
document.getElementById('cardOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.getElementById('catOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeCatModal(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeCatModal(); }
});

// ─── BOOT ─────────────────────────────────────────────────────────────────────
document.getElementById('nameOverlay').addEventListener('click', e => {
  if (e.target !== e.currentTarget) return;
  if (currentUser) document.getElementById('nameOverlay').classList.remove('open');
});
tryServerLoad().then(ok => { if (!ok) restoreHandle(); });
